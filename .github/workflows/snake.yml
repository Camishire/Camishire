name: Generate Snake Animation

# Controls when the workflow will run
on:
  # Runs at 00:00 UTC every day
  schedule:
    - cron: "0 0 * * *"
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  
  # Run on every push to main branch
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Generate the snake animation
      - name: Generate snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Camishire
          outputs: |
            dist/github-snake.svg?palette=github-light&color_snake=#FF6B9D&color_dots=#FFE5EC,#FFB3C6,#FF8FAB,#FF6B9D,#C77DFF
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#FF6B9D&color_dots=#FFE5EC,#FFB3C6,#FF8FAB,#FF6B9D,#C77DFF
      
      # Push the generated files to the output branch
      - name: Push snake.svg to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
